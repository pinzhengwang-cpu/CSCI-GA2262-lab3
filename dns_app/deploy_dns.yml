apiVersion: apps/v1
kind: Deployment
metadata:
  name: as-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: as
  template:
    metadata:
      labels:
        app: as
    spec:
      containers:
        - name: as
          image: as:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 53533
              protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: as-svc
spec:
  type: NodePort
  selector:
    app: as
  ports:
    - name: dns-udp
      protocol: UDP
      port: 53533
      targetPort: 53533
      nodePort: 30001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fs-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
