        app: fs
    spec:
      containers:
        - name: fs
          image: fs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: fs-svc
spec:
  type: NodePort
  selector:
    app: fs
  ports:
    - name: http
